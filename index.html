<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Looking Up</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- satellite.js v6 — SGP4 propagation -->
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.0/dist/satellite.min.js"></script>

  <!-- astronomy-engine — planets, Moon, Sun position -->
  <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.min.js"></script>
</head>
<body>
  <canvas id="sky"></canvas>

  <!-- UI panels injected by JS modules -->
  <div id="hud"></div>
  <div id="callout"></div>
  <div id="loading-bar"></div>
  <div id="colour-key">
    <span class="ck-item"><span class="ck-dot" style="background:rgba(255,255,255,0.65)"></span>Stars</span>
    <span class="ck-item"><span class="ck-dot" style="background:rgba(255,240,200,0.85)"></span>Planets</span>
    <span class="ck-item"><span class="ck-dot" style="background:rgba(220,220,230,0.75)"></span>Moon</span>
    <span class="ck-item"><span class="ck-dot" style="background:#ffd700"></span>ISS</span>
    <span class="ck-item"><span class="ck-dot" style="background:#66cccc"></span>Satellites</span>
    <span class="ck-item"><span class="ck-dot" style="background:#ffe0b0"></span>Starlink</span>
  </div>
  <div id="compass">
    <div class="compass-ring">
      <span class="compass-n">N</span>
      <span class="compass-e">E</span>
      <span class="compass-s">S</span>
      <span class="compass-w">W</span>
      <span class="compass-dot"></span>
    </div>
  </div>
  <button id="reset-btn" title="Reset view (double-click)">⟲</button>

  <!-- v2 time scrubber slot — reserved, not implemented in v1 -->
  <div id="scrubber-slot" data-scrubber-slot aria-hidden="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
